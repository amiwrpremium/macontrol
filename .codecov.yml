codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: nearest
  range: "70...90"

  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
        removed_code_behavior: removals_only
    patch:
      default:
        target: 60%
        threshold: 5%
        only_pulls: true

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
  show_carryforward_flags: false

github_checks:
  annotations: false

ignore:
  - "cmd/macontrol/shim.go"
  - "dist/**"
  - "internal/telegram/telegramtest/**"
  - "internal/version/**"
  - "**/*.pb.go"
  - "**/zz_generated_*.go"
