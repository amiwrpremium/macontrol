# Optional dev git hooks. Install with:  lefthook install
# (lefthook is not required for CI — it only runs locally if opted in.)

pre-commit:
  parallel: true
  commands:
    gofumpt:
      glob: "*.go"
      run: gofumpt -l -w {staged_files}
      stage_fixed: true
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --new-from-rev HEAD --fast

commit-msg:
  commands:
    conventional:
      run: |
        head -n1 "{1}" | grep -E '^(feat|fix|perf|refactor|docs|test|build|ci|chore|revert)(\([a-z0-9,-]+\))?!?: .+' \
          || { echo "commit message must follow Conventional Commits (see .gitmessage)"; exit 1; }
