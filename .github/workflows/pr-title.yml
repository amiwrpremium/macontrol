name: PR Title

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Validate
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          scopes: |
            sound
            display
            power
            wifi
            bt
            battery
            system
            media
            notify
            tools
            bot
            flows
            keyboards
            callbacks
            runner
            config
            capability
            setup
            service
            doctor
            launchd
            brew
            tap
            ci
            release
            deps
            docs
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            Subject must start with a lowercase letter.
            Example: feat(sound): add inline keyboard for volume ±
