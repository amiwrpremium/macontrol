name: Release

on:
  push:
    tags:
      - "v*"

# Default-deny at the workflow level. The single job opts into the
# narrowest scopes it actually needs.
permissions: {}

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      # goreleaser needs to push the GitHub Release + upload assets.
      contents: write
      # id-token enables future Sigstore / cosign keyless signing.
      # Not currently used by .goreleaser.yaml but kept so a later
      # `signs:` block works without a separate permissions PR.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT with `contents: write` on amiwrpremium/homebrew-tap.
          # Create it in settings and store as the HOMEBREW_TAP_TOKEN secret.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
