name: ❓ Question
description: Prefer Discussions for questions — but file here if you'd rather not.
title: "question: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended questions, consider using
        [GitHub Discussions](https://github.com/amiwrpremium/macontrol/discussions)
        instead — more eyes, less triage noise.

  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Even a sentence helps us give a useful answer.
